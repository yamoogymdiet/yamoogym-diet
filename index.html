<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>야무짐 다이어트</title>

<style>
body {
    margin:0;
    font-family: sans-serif;
    background:#f8f8f8;
    text-align:center;
}

.container {
    padding:40px 20px;
}

h1 {
    font-size:28px;
    margin-bottom:10px;
}

p {
    color:#555;
}

.box {
    background:white;
    padding:20px;
    margin:20px auto;
    max-width:400px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.btn {
    display:block;
    margin-top:15px;
    padding:15px;
    background:#ff4d4d;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h1>운동했는데 살이 안 빠진다면?</h1>
<p>문제는 의지가 아니라 방법일 수 있습니다</p>

<div class="box">
<h3>이런 분들 꼭 보세요</h3>
<p>✔ 운동해도 변화 없는 분</p>
<p>✔ 요요 반복되는 분</p>
<p>✔ 혼자 다이어트 힘든 분</p>

<a class="btn" href="tel:010-0000-0000">무료 상담 신청</a>
</div>

</body>
</html>
